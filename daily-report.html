<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shift Log</title>
<style>
  :root{
    --ink:#1b2430;
    --paper:#f6f4ef;
    --panel:#ffffff;
    --line:#dcd7cb;
    --slate:#3d4a5c;
    --slate-dark:#26313f;
    --amber:#c8792a;
    --amber-dark:#a8621c;
    --muted:#7a8494;
    --danger:#b3413a;
    --mono: "JetBrains Mono","SFMono-Regular",Consolas,monospace;
    --serif: "Georgia","Iowan Old Style",serif;
    --sans: -apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
  }
  .topbar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:22px 32px 16px;
    border-bottom:2px solid var(--ink);
  }
  .topbar h1{
    font-family:var(--serif);
    font-size:26px;
    margin:0;
    letter-spacing:0.3px;
  }
  .topbar .sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1.5px;
  }
  .layout{
    display:grid;
    grid-template-columns:minmax(320px,420px) 1fr;
    gap:0;
    min-height:calc(100vh - 70px);
  }
  @media (max-width:860px){
    .layout{grid-template-columns:1fr;}
  }
  .pane{padding:28px 32px;}
  .pane-left{
    border-right:2px solid var(--ink);
    background:var(--panel);
  }
  .pane-right{
    background:var(--paper);
  }
  .section-label{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--amber-dark);
    margin:0 0 18px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  label{
    display:block;
    font-size:11px;
    font-family:var(--mono);
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--muted);
    margin:16px 0 6px;
  }
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=date], input[type=time], textarea, select{
    width:100%;
    font-family:var(--sans);
    font-size:14.5px;
    padding:10px 12px;
    border:1.5px solid var(--line);
    border-radius:3px;
    background:#fff;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  input:focus, textarea:focus, select:focus{
    border-color:var(--slate);
  }
  textarea{
    resize:vertical;
    min-height:170px;
    line-height:1.5;
  }
  .row2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .row3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;
  }
  .btn{
    font-family:var(--mono);
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:1px;
    border:none;
    border-radius:3px;
    padding:11px 18px;
    cursor:pointer;
    transition:transform .08s, background .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{
    background:var(--slate-dark);
    color:#fff;
    width:100%;
    margin-top:20px;
  }
  .btn-primary:hover{background:var(--slate);}
  .btn-ghost{
    background:transparent;
    border:1.5px solid var(--line);
    color:var(--slate-dark);
  }
  .btn-ghost:hover{border-color:var(--slate);}
  .btn-danger{
    background:transparent;
    border:1.5px solid var(--danger);
    color:var(--danger);
  }
  .btn-danger:hover{background:var(--danger);color:#fff;}
  .btn-amber{
    background:var(--amber);
    color:#fff;
  }
  .btn-amber:hover{background:var(--amber-dark);}
  .status{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    margin-top:10px;
    min-height:14px;
  }
  .status.ok{color:#3a7d44;}
  .status.err{color:var(--danger);}

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .toolbar input[type=text]{flex:1;min-width:160px;}
  .toolbar input[type=date]{max-width:160px;}

  .entries{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .card{
    background:var(--panel);
    border:1.5px solid var(--line);
    border-left:4px solid var(--slate-dark);
    border-radius:3px;
    padding:16px 18px;
  }
  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    cursor:pointer;
  }
  .card-title{
    font-weight:600;
    font-size:15px;
    margin:0 0 4px;
  }
  .card-meta{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    letter-spacing:.4px;
  }
  .card-meta b{color:var(--amber-dark);}
  .chevron{
    font-family:var(--mono);
    color:var(--muted);
    font-size:14px;
    user-select:none;
  }
  .card-body{
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--line);
    display:none;
  }
  .card.open .card-body{display:block;}
  .card-content{
    white-space:pre-wrap;
    font-size:14px;
    line-height:1.6;
    margin:0 0 14px;
  }
  .edit-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:12px;
  }
  .edit-grid label{margin:0 0 4px;}
  .card-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .empty{
    font-family:var(--mono);
    color:var(--muted);
    font-size:13px;
    padding:40px 10px;
    text-align:center;
    border:1.5px dashed var(--line);
    border-radius:3px;
  }
  .count-badge{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Shift Log</h1>
  <div class="sub">local SQLite &middot; daily reports</div>
</div>

<div class="layout">

  <!-- LEFT: write report -->
  <div class="pane pane-left">
    <p class="section-label">New entry</p>

    <label for="f-title">Title</label>
    <input type="text" id="f-title" placeholder="e.g. Line 2 handover">

    <div class="row2">
      <div>
        <label for="f-date">Date</label>
        <input type="date" id="f-date">
      </div>
      <div>
        <label for="f-shift">Shift</label>
        <select id="f-shift">
          <option value="Morning">Morning</option>
          <option value="Afternoon">Afternoon</option>
          <option value="Night">Night</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div>
        <label for="f-start">Start time</label>
        <input type="time" id="f-start">
      </div>
      <div>
        <label for="f-end">End time</label>
        <input type="time" id="f-end">
      </div>
    </div>

    <label for="f-content">Report</label>
    <textarea id="f-content" placeholder="What happened during the shift..."></textarea>

    <button class="btn btn-primary" id="btn-save">Save report</button>
    <div class="status" id="save-status"></div>
  </div>

  <!-- RIGHT: view/manage reports -->
  <div class="pane pane-right">
    <p class="section-label">Saved reports</p>

    <div class="toolbar">
      <input type="text" id="q-search" placeholder="Search title or content...">
      <input type="date" id="q-date" title="Filter by date">
      <button class="btn btn-ghost" id="btn-clear-filter">Clear</button>
    </div>

    <div id="entries" class="entries">
      <div class="empty">Loading...</div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script>
(async function(){

  const STORAGE_KEY = 'daily_shift_report_sqlite_db_v1';
  let SQL, db;
  let allReports = [];

  const $ = (id) => document.getElementById(id);
  const entriesEl = $('entries');
  const saveStatus = $('save-status');

  function todayISO(){
    const d = new Date();
    return d.toISOString().slice(0,10);
  }
  $('f-date').value = todayISO();

  function setStatus(msg, kind){
    saveStatus.textContent = msg;
    saveStatus.className = 'status' + (kind ? ' '+kind : '');
    if(msg){
      setTimeout(()=>{ if(saveStatus.textContent===msg) saveStatus.textContent=''; }, 3000);
    }
  }

  // ---- base64 <-> Uint8Array helpers ----
  function bytesToBase64(bytes){
    let binary = '';
    const chunk = 0x8000;
    for(let i=0;i<bytes.length;i+=chunk){
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
    }
    return btoa(binary);
  }
  function base64ToBytes(b64){
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  async function persistDb(){
    try{
      const data = db.export();
      const b64 = bytesToBase64(data);
      await window.storage.set(STORAGE_KEY, b64, false);
    }catch(e){
      console.error('Persist failed', e);
      setStatus('Could not save to storage', 'err');
    }
  }

  async function loadDb(){
    SQL = await initSqlJs({
      locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
    });

    let bytes = null;
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        bytes = base64ToBytes(res.value);
      }
    }catch(e){
      // key doesn't exist yet - fine
    }

    if(bytes){
      db = new SQL.Database(bytes);
    }else{
      db = new SQL.Database();
      db.run(`
        CREATE TABLE reports (
          id INTEGER PRIMARY KEY AUTOINCREMENT,
          title TEXT NOT NULL,
          content TEXT NOT NULL,
          report_date TEXT NOT NULL,
          shift TEXT,
          start_time TEXT,
          end_time TEXT,
          created_at TEXT NOT NULL,
          updated_at TEXT NOT NULL
        );
      `);
      await persistDb();
    }
  }

  function rowsToObjects(result){
    if(!result || result.length===0) return [];
    const cols = result[0].columns;
    return result[0].values.map(row=>{
      const obj = {};
      cols.forEach((c,i)=> obj[c]=row[i]);
      return obj;
    });
  }

  function fetchReports(){
    const res = db.exec('SELECT * FROM reports ORDER BY report_date DESC, start_time DESC, id DESC;');
    allReports = rowsToObjects(res);
    renderReports();
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function matchesFilter(r){
    const q = $('q-search').value.trim().toLowerCase();
    const d = $('q-date').value;
    if(d && r.report_date !== d) return false;
    if(q && !(r.title.toLowerCase().includes(q) || r.content.toLowerCase().includes(q))) return false;
    return true;
  }

  function renderReports(){
    const filtered = allReports.filter(matchesFilter);
    if(filtered.length===0){
      entriesEl.innerHTML = `<div class="empty">No reports yet. Write one on the left.</div>`;
      return;
    }
    entriesEl.innerHTML = filtered.map(r => cardHtml(r)).join('');
  }

  function timeRangeLabel(r){
    if(r.start_time && r.end_time) return `${r.start_time}–${r.end_time}`;
    if(r.start_time) return `from ${r.start_time}`;
    return '';
  }

  function cardHtml(r){
    return `
    <div class="card" data-id="${r.id}">
      <div class="card-head" onclick="window.__toggleCard(${r.id})">
        <div>
          <p class="card-title">${escapeHtml(r.title)}</p>
          <div class="card-meta"><b>${escapeHtml(r.report_date)}</b> &middot; ${escapeHtml(r.shift||'')} ${timeRangeLabel(r) ? '&middot; '+escapeHtml(timeRangeLabel(r)) : ''}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body">
        <p class="card-content">${escapeHtml(r.content)}</p>

        <div class="edit-grid">
          <div>
            <label>Date</label>
            <input type="date" value="${r.report_date}" data-field="report_date" data-id="${r.id}">
          </div>
          <div>
            <label>Start</label>
            <input type="time" value="${r.start_time||''}" data-field="start_time" data-id="${r.id}">
          </div>
          <div>
            <label>End</label>
            <input type="time" value="${r.end_time||''}" data-field="end_time" data-id="${r.id}">
          </div>
        </div>

        <div class="card-actions">
          <button class="btn btn-amber" onclick="window.__saveEdit(${r.id})">Save changes</button>
          <button class="btn btn-ghost" onclick="window.__download(${r.id})">Download .txt</button>
          <button class="btn btn-danger" onclick="window.__deleteReport(${r.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }

  window.__toggleCard = function(id){
    const card = entriesEl.querySelector(`.card[data-id="${id}"]`);
    if(card) card.classList.toggle('open');
  };

  window.__saveEdit = async function(id){
    const card = entriesEl.querySelector(`.card[data-id="${id}"]`);
    const date = card.querySelector('[data-field="report_date"]').value;
    const start = card.querySelector('[data-field="start_time"]').value;
    const end = card.querySelector('[data-field="end_time"]').value;
    const now = new Date().toISOString();
    db.run(`UPDATE reports SET report_date=?, start_time=?, end_time=?, updated_at=? WHERE id=?;`,
      [date, start, end, now, id]);
    await persistDb();
    fetchReports();
    // reopen the card that was just edited
    const reopened = entriesEl.querySelector(`.card[data-id="${id}"]`);
    if(reopened) reopened.classList.add('open');
  };

  window.__deleteReport = async function(id){
    if(!confirm('Delete this report? This cannot be undone.')) return;
    db.run('DELETE FROM reports WHERE id=?;', [id]);
    await persistDb();
    fetchReports();
  };

  window.__download = function(id){
    const r = allReports.find(x=>x.id===id);
    if(!r) return;
    const range = timeRangeLabel(r);
    const text =
`SHIFT REPORT
=============================
Title:     ${r.title}
Date:      ${r.report_date}
Shift:     ${r.shift||''}${range ? ' ('+range+')' : ''}
Saved:     ${r.created_at}
Updated:   ${r.updated_at}
-----------------------------

${r.content}
`;
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `shift-report_${r.report_date}_${(r.title||'report').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // ---- save new report ----
  $('btn-save').addEventListener('click', async ()=>{
    const title = $('f-title').value.trim();
    const content = $('f-content').value.trim();
    const date = $('f-date').value;
    const shift = $('f-shift').value;
    const start = $('f-start').value;
    const end = $('f-end').value;

    if(!title || !content || !date){
      setStatus('Please fill in title, date and report content.', 'err');
      return;
    }

    const now = new Date().toISOString();
    db.run(
      `INSERT INTO reports (title, content, report_date, shift, start_time, end_time, created_at, updated_at)
       VALUES (?,?,?,?,?,?,?,?);`,
      [title, content, date, shift, start, end, now, now]
    );
    await persistDb();
    fetchReports();

    $('f-title').value='';
    $('f-content').value='';
    $('f-start').value='';
    $('f-end').value='';
    setStatus('Report saved.', 'ok');
  });

  $('q-search').addEventListener('input', renderReports);
  $('q-date').addEventListener('input', renderReports);
  $('btn-clear-filter').addEventListener('click', ()=>{
    $('q-search').value='';
    $('q-date').value='';
    renderReports();
  });

  // ---- init ----
  try{
    await loadDb();
    fetchReports();
  }catch(e){
    console.error(e);
    entriesEl.innerHTML = `<div class="empty">Failed to load database: ${escapeHtml(e.message||String(e))}</div>`;
  }

})();
</script>

</body>
</html>
